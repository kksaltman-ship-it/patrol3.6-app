<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>デジタル巡回点検システム (スマホ版)</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 15px;
            color: #333;
        }
        h1 {
            font-size: 1.4rem;
            text-align: center;
            color: #1a365d;
            margin-bottom: 20px;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #2b6cb0;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 5px;
        }
        button {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: background 0.2s;
        }
        .btn-primary { background-color: #3182ce; color: white; }
        .btn-primary:active { background-color: #2b6cb0; }
        .btn-success { background-color: #38a169; color: white; margin-top: 15px; font-size: 1.1rem; }
        .btn-success:active { background-color: #2f855a; }
        
        #reader {
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #edf2f7;
        }
        .result-label { font-weight: bold; }
        .radio-group {
            display: flex;
            gap: 15px;
        }
        .radio-group label {
            padding: 6px 12px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            background: #f7fafc;
        }
        .radio-group input:checked + label {
            background: #3182ce;
            color: white;
            border-color: #3182ce;
        }
        .radio-group input { display: none; }
        #noise-display {
            font-size: 1.5rem;
            text-align: center;
            font-weight: bold;
            color: #e53e3e;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <h1>巡回点検システム (スマホ用)</h1>

    <div class="card">
        <div class="card-title">① エリアQRコード読み取り</div>
        <button class="btn-primary" onclick="startScan()">カメラを起動してスキャン</button>
        <div id="reader" style="display:none;"></div>
        <div class="result-row" style="margin-top:10px;">
            <span>現在のエリア:</span>
            <span id="current-area" style="font-weight:bold; color:#e53e3e;">未スキャン</span>
        </div>
    </div>

    <div class="card">
        <div class="card-title">② 点検確認</div>
        
        <div class="result-row">
            <span class="result-label">1. 設備・照明状態</span>
            <div class="radio-group">
                <input type="radio" id="q1-ok" name="q1" value="○" checked><label for="q1-ok">○ 正常</label>
                <input type="radio" id="q1-ng" name="q1" value="×"><label for="q1-ng">× 異常</label>
            </div>
        </div>

        <div class="result-row">
            <span class="result-label">2. 火気・安全確認</span>
            <div class="radio-group">
                <input type="radio" id="q2-ok" name="q2" value="○" checked><label for="q2-ok">○ 正常</label>
                <input type="radio" id="q2-ng" name="q2" value="×"><label for="q2-ng">× 異常</label>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">③ 騒音・異音計測 (マイク)</div>
        <button class="btn-primary" onclick="startNoiseMeasurement()">計測スタート (5秒間)</button>
        <div id="noise-display">0.0 dB</div>
        <div style="font-size:0.8rem; color:#718096; text-align:center;">※計測中の最大音量を記録します</div>
    </div>

    <button class="btn-success" onclick="downloadExcel()">点検データをExcel保存</button>

    <script>
        let scannedArea = "未登録";
        let maxVolume = 0;
        let html5QrcodeScanner;

        // --- QRコードスキャン処理 ---
        function startScan() {
            document.getElementById('reader').style.display = 'block';
            html5QrcodeScanner = new Html5Qrcode("reader");
            html5QrcodeScanner.start(
                { facingMode: "environment" }, // 背面カメラを使用
                { fps: 10, qrbox: 250 },
                (decodedText) => {
                    scannedArea = decodedText;
                    document.getElementById('current-area').innerText = decodedText;
                    html5QrcodeScanner.stop();
                    document.getElementById('reader').style.display = 'none';
                },
                (errorMessage) => { /* スキャン中のエラーは無視 */ }
            ).catch(err => {
                alert("カメラの起動に失敗しました。ブラウザの許可設定を確認してください。");
            });
        }

        // --- マイク騒音計測処理（簡易版ボリュームメーター） ---
        async function startNoiseMeasurement() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const analyser = audioContext.createAnalyser();
                const microphone = audioContext.createMediaStreamSource(stream);
                const javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

                analyser.smoothingTimeConstant = 0.8;
                analyser.fftSize = 1024;

                microphone.connect(analyser);
                analyser.connect(javascriptNode);
                javascriptNode.connect(audioContext.destination);

                maxVolume = 0;
                let startTime = Date.now();

                javascriptNode.onaudioprocess = function() {
                    const array = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(array);
                    let values = 0;
                    for (let i = 0; i < array.length; i++) { values += array[i]; }
                    let average = values / array.length;
                    
                    // 簡易的なdB換算処理
                    let currentDb = Math.round(average * 1.5); 
                    if (currentDb > maxVolume) {
                        maxVolume = currentDb;
                        document.getElementById('noise-display').innerText = maxVolume + " dB";
                    }

                    // 5秒経過したら自動停止
                    if (Date.now() - startTime > 5000) {
                        stream.getTracks().forEach(track => track.stop());
                        javascriptNode.onaudioprocess = null;
                        alert("計測が完了しました！ 最大音量: " + maxVolume + " dB");
                    }
                };
            } catch (err) {
                alert("マイクの起動に失敗しました。ブラウザの許可設定を確認してください。");
            }
        }

        // --- 【今回の修正箇所】Excel(CSV)ダウンロード処理 ---
        function downloadExcel() {
            // 1. スマホの現在時刻から「日付」と「時間」を正確に取得
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');

            // 「2026/06/16 13:45」の形を作成
            const fullTimestamp = `${year}/${month}/${date} ${hours}:${minutes}`;

            // 2. 点検結果の取得
            const q1Result = document.querySelector('input[name="q1"]:checked').value;
            const q2Result = document.querySelector('input[name="q2"]:checked').value;

            // 3. CSVデータの作成（Excelが1セルとして認識するようダブルクォーテーションで囲む）
            // 列構成：点検日時, エリア名, 設備・照明, 火気・安全, 騒音値(dB)
            const headers = ["点検日時", "エリア名", "設備・照明", "火気・安全", "騒音値(dB)"];
            const rowData = [
                `"${fullTimestamp}"`, 
                `"${scannedArea}"`, 
                `"${q1Result}"`, 
                `"${q2Result}"`, 
                `"${maxVolume}"`
            ];

            // Excelの文字化けを防ぐための「BOM（\uFEFF）」を追加
            const csvContent = "\uFEFF" + headers.join(",") + "\n" + rowData.join(",");

            // 4. ファイルのダウンロード処理
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            
            // ファイル名にも日付を付与（例: 巡回結果_20260616_1345.csv）
            link.setAttribute("href", url);
            link.setAttribute("download", `巡回結果_${year}${month}${date}_${hours}${minutes}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
