<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>巡回点検システム V4.2 (履歴全保存版)</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 0; }
        .page { display: none; padding: 15px; box-sizing: border-box; }
        .page.active { display: block; }
        
        .sticky-nav {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 15px;
            border-bottom: 2px solid #444;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            margin-bottom: 15px;
        }

        .btn { display: block; width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; cursor: pointer; text-align: center; color: white; text-decoration: none; box-sizing: border-box; }
        .btn-blue { background: #007bff; }
        .btn-orange { background: #ff9800; }
        .btn-green { background: #28a745; }
        .btn-purple { background: #6f42c1; }
        .btn-gray { background: #555; }
        .btn-small { width: auto; padding: 8px 15px; font-size: 0.9rem; margin-bottom: 0; }
        .btn-red-outline { background: none; border: 1px solid #ff5252; color: #ff5252; }
        
        #reader { width: 100%; max-width: 400px; margin: 0 auto; border-radius: 12px; overflow: hidden; background: #000; border: 5px solid transparent; }
        .db-display { font-size: 3rem; font-weight: bold; color: #ffeb3b; text-align: center; margin: 10px 0; }
        .card { background: #333; margin-bottom: 12px; padding: 15px; border-radius: 10px; border-left: 5px solid #28a745; }
        .row { display: flex; gap: 8px; margin-top: 8px; }
        select, input, textarea { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 1rem; }
        .input-dark { background: #2a2a2a; color: white; border: 1px solid #444; text-align: center; }
        .log-container { background: #222; border-radius: 10px; padding: 10px; margin-top: 20px; font-size: 0.85rem; border: 1px solid #444; }
        .log-entry { color: #4caf50; border-bottom: 1px solid #333; padding: 8px 0; font-weight: bold; }
        .scan-msg { background: #4caf50; color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; text-align: center; animation: fadeOut 3s forwards; }
        @keyframes fadeOut { 0% {opacity: 1;} 80% {opacity: 1;} 100% {opacity: 0;} }
        #config-ui { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; padding:20px; box-sizing:border-box; overflow-y: auto; }
        .config-section { background: #222; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="setup-page" class="page active" style="text-align:center; padding-top:40px;">
        <h2>巡回点検システム <span style="font-size:1rem; color:#aaa;">V4.2</span></h2>
        <p style="color:#aaa; font-size:0.9rem; padding:0 20px;">交代時は名前を書き換えて[起動]を押してください</p>
        
        <div style="margin: 30px 15px; background:#222; padding:20px; border-radius:12px; border:1px solid #444;">
            <label style="display:block; margin-bottom:12px; font-weight:bold; color:#ffeb3b;">👤 現在の点検担当者名</label>
            <input type="text" id="inspectorName" class="input-dark" placeholder="例：山田 太郎" style="width:100%; box-sizing:border-box; font-size:1.2rem;">
        </div>

        <button onclick="startApp()" class="btn btn-blue" style="width:90%; margin:0 auto;">システムを起動する</button>
    </div>

    <div id="scan-page" class="page">
        <div class="sticky-nav" style="margin-bottom:10px;">
            <div style="font-size:0.85rem; color:#aaa;">担当：<span id="nav-worker-name" style="color:#fff; font-weight:bold;">--</span></div>
            <h3 style="margin:0; font-size:1.1rem;">📷 打刻スキャン</h3>
            <button onclick="goToSetup()" class="btn btn-gray btn-small">👤 交代</button>
        </div>
        <div id="reader"></div>
        <div class="db-display" id="db-live">-- dB</div>
        <div style="background:#333; padding:10px; border-radius:10px; margin-bottom:15px;">
            <p style="font-size:0.7rem; color:#ccc; margin:0 0 5px 0;">手動打刻（#のエリアのみ）</p>
            <div style="display:flex; gap:5px;">
                <select id="manualAreaSelect"></select>
                <button onclick="manualLog()" style="padding:10px; background: #666; color:white; border:none; border-radius:5px; width:80px;">打刻</button>
            </div>
        </div>
        <button onclick="showPage('check-page')" class="btn btn-green">📋 点検リスト入力へ</button>
        <button onclick="downloadExcel()" class="btn btn-purple">📊 Excelファイルを保存</button>
        <button onclick="sendReport()" class="btn btn-orange">📤 メールで結果を報告</button>
        <div class="log-container">
            <div id="scan-status"></div>
            <div id="statusLog"></div>
        </div>
        <button onclick="toggleConfig()" style="margin-top:20px; width:100%; background:none; border:none; color:#555; font-size:0.8rem;">⚙ 設定</button>
    </div>

    <div id="check-page" class="page" style="padding:0;">
        <div class="sticky-nav">
            <button onclick="showPage('scan-page')" class="btn btn-gray btn-small">⬅ 戻る</button>
            <h3 style="margin:0; font-size:1.1rem;">📋 点検リスト</h3>
            <button onclick="goToSetup()" class="btn btn-gray btn-small">👤 交代</button>
        </div>
        <div style="padding:15px;">
            <div id="checklist-container"></div>
            <button onclick="downloadExcel()" class="btn btn-purple" style="margin-top:20px;">📊 Excelファイルを保存</button>
            <button onclick="sendReport()" class="btn btn-orange">📤 メールで結果を報告</button>
            <button onclick="clearData()" class="btn btn-red-outline" style="margin-top:30px;">🔄 本日の全データをリセット</button>
        </div>
    </div>

    <div id="config-ui">
        <h3>⚙ システム設定</h3>
        <div class="config-section">
            <label style="display:block; margin-bottom:10px; color:#ffeb3b;">📬 報告メール送信先</label>
            <input type="email" id="cfgEmail" style="width:100%; box-sizing:border-box;" placeholder="example@mail.com">
        </div>
        <div class="config-section">
            <label style="display:block; margin-bottom:10px; color:#ffeb3b;">📍 エリア登録（1行1項目）</label>
            <textarea id="cfgAreas" rows="8" style="width:100%; box-sizing:border-box;" placeholder="エリア名#
エリア名*"></textarea>
        </div>
        <button onclick="saveConfig()" class="btn btn-green" style="margin-top:10px;">✅ 設定を保存する</button>
        <button onclick="toggleConfig()" class="btn btn-gray">キャンセル</button>
    </div>

<script>
    let audioContext, analyser, currentDb = 0, html5QrCode;
    let isProcessing = false;
    let savedScrollPositions = {};

    function showPage(pageId) {
        const currentPage = document.querySelector('.page.active');
        if (currentPage) savedScrollPositions[currentPage.id] = window.scrollY;

        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        
        if(pageId === 'check-page') {
            renderChecklist();
            setTimeout(() => { window.scrollTo(0, savedScrollPositions['check-page'] || 0); }, 50);
        } else {
            window.scrollTo(0, savedScrollPositions[pageId] || 0);
        }
    }

    function goToSetup() {
        if(html5QrCode) { html5QrCode.stop().catch(e=>console.log(e)); html5QrCode = null; }
        showPage('setup-page');
    }

    async function startApp() {
        const nameInput = document.getElementById('inspectorName').value.trim();
        if(!nameInput) { alert("担当者名を入力してください。"); return; }
        localStorage.setItem('myPatrolInspector', nameInput);
        document.getElementById('nav-worker-name').innerText = nameInput;

        try {
            if (!audioContext) {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                audioContext.createMediaStreamSource(stream).connect(analyser);
                updateDb();
            }
            showPage('scan-page');
            if(!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
                await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => { doLog(txt); });
            }
            setupManualSelect();
            refreshLogDisplay();
        } catch (err) {
            alert("カメラ・マイク・位置情報の使用を許可してください。");
        }
    }

    function updateDb() {
        if (!analyser) return;
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        currentDb = Math.round((Math.max(...data) / 255) * 70 + 30);
        document.getElementById('db-live').innerText = currentDb + " dB";
        requestAnimationFrame(updateDb);
    }

    function getGPSPosition() {
        return new Promise((resolve) => {
            if (!navigator.geolocation) { resolve({ lat: null, lng: null }); return; }
            navigator.geolocation.getCurrentPosition(
                (position) => { resolve({ lat: position.coords.latitude, lng: position.coords.longitude }); },
                (error) => { console.error("GPS取得失敗:", error); resolve({ lat: null, lng: null }); },
                { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
            );
        });
    }

    function getTodayDateString() {
        const d = new Date();
        return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}`;
    }

    function getNowTimeString() {
        const d = new Date();
        return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}:${String(d.getSeconds()).padStart(2, '0')}`;
    }

    // 【V4.2仕様変更】履歴をすべて配列として末尾に追加していく（上書き廃止）
    async function doLog(txt, isManual = false) {
        if (isProcessing && !isManual) return;
        isProcessing = true;

        const statusDiv = document.getElementById('scan-status');
        if(!isManual) {
            document.getElementById('reader').style.border = "5px solid #ff9800";
            statusDiv.innerHTML = `<div class="scan-msg" style="background:#ff9800;">🛰️ 位置情報を取得中...</div>`;
        }

        const coords = await getGPSPosition();
        let timeline = JSON.parse(localStorage.getItem('myPatrolTimeline')) || [];
        const cleanKey = txt.replace(/[#*]/g,'');
        
        // 1つのアクションごとに独立したオブジェクトを作って履歴に追加
        const newLog = {
            type: "SCAN",
            area: cleanKey,
            date: getTodayDateString(),
            time: getNowTimeString() + (isManual ? "(手)" : ""),
            inspector: localStorage.getItem('myPatrolInspector') || "未登録",
            db: currentDb,
            lat: coords.lat,
            lng: coords.lng
        };
        
        timeline.push(newLog);
        localStorage.setItem('myPatrolTimeline', JSON.stringify(timeline));
        refreshLogDisplay();
        
        if(!isManual) {
            document.getElementById('reader').style.border = "5px solid #4caf50";
            statusDiv.innerHTML = `<div class="scan-msg">✨ ${cleanKey} を記録</div>`;
            setTimeout(() => { isProcessing = false; document.getElementById('reader').style.border = "5px solid transparent"; }, 3000);
        } else { isProcessing = false; }
    }

    // 最新の入力内容（UIへの初期値反映用）
    function getLatestCheckValue(cleanKey) {
        let timeline = JSON.parse(localStorage.getItem('myPatrolTimeline')) || [];
        let res = { r1: "", r1note: "", r2: "", r2note: "" };
        for (let i = timeline.length - 1; i >= 0; i--) {
            if (timeline[i].type === "CHECK" && timeline[i].area === cleanKey) {
                if(timeline[i].field === "r1") res.r1 = timeline[i].val;
                if(timeline[i].field === "r1note") res.r1note = timeline[i].val;
                if(timeline[i].field === "r2") res.r2 = timeline[i].val;
                if(timeline[i].field === "r2note") res.r2note = timeline[i].val;
            }
        }
        return res;
    }

    function renderChecklist() {
        const container = document.getElementById('checklist-container');
        const areas = JSON.parse(localStorage.getItem('myPatrolAreas')) || [];
        const targets = areas.filter(a => !a.endsWith('#'));
        if(targets.length === 0) {
            container.innerHTML = "<p style='color:#888; text-align:center;'>設定から点検エリアを登録してください</p>";
            return;
        }
        container.innerHTML = targets.map(area => {
            const cleanKey = area.replace(/[#*]/g,'');
            const res = getLatestCheckValue(cleanKey);
            const isSingle = area.endsWith('*');
            return `<div class="card">
                <h4 style="margin:0 0 10px 0; color:#ffeb3b;">📍 ${cleanKey}</h4>
                <div class="row">
                    <select onchange="updateResult('${cleanKey}','r1',this.value)">
                        <option value="">点検1</option>
                        <option value="○" ${res.r1==='○'?'selected':''}>○ 異常なし</option>
                        <option value="×" ${res.r1==='×'?'selected':''}>× 異常あり</option>
                        <option value="-" ${res.r1==='-'?'selected':''}>- 省略</option>
                    </select>
                    <input type="text" placeholder="メモ" value="${res.r1note||''}" onchange="updateResult('${cleanKey}','r1note',this.value)">
                </div>
                ${!isSingle ? `<div class="row">
                    <select onchange="updateResult('${cleanKey}','r2',this.value)">
                        <option value="">点検2</option>
                        <option value="○" ${res.r2==='○'?'selected':''}>○ 異常なし</option>
                        <option value="×" ${res.r2==='×'?'selected':''}>× 異常あり</option>
                        <option value="-" ${res.r2==='-'?'selected':''}>- 省略</option>
                    </select>
                    <input type="text" placeholder="メモ" value="${res.r2note||''}" onchange="updateResult('${cleanKey}','r2note',this.value)">
                </div>` : ''}
            </div>`;
        }).join('');
    }

    // 【V4.2新機能】点検入力時も毎回新しい履歴として時間とともに保存
    function updateResult(cleanKey, field, val) {
        let timeline = JSON.parse(localStorage.getItem('myPatrolTimeline')) || [];
        const newCheckLog = {
            type: "CHECK",
            area: cleanKey,
            field: field,
            val: val,
            date: getTodayDateString(),
            time: getNowTimeString(),
            inspector: localStorage.getItem('myPatrolInspector') || "未登録"
        };
        timeline.push(newCheckLog);
        localStorage.setItem('myPatrolTimeline', JSON.stringify(timeline));
    }

    // 【V4.2大改修】タイムラインをそのまま時系列の行としてExcel出力。打刻も点検もすべての時間が別々に出ます
    function downloadExcel() {
        const timeline = JSON.parse(localStorage.getItem('myPatrolTimeline')) || [];
        if (timeline.length === 0) { alert("保存するデータがありません"); return; }

        const excelData = [[ "発生日付", "発生時刻", "担当者名", "巡回エリア名", "アクション項目", "内容 / 騒音値 / 点検結果", "メモ欄", "位置情報(GoogleMap)" ]];

        timeline.forEach(log => {
            let actionName = "";
            let contentVal = "";
            let noteVal = "";
            let mapLink = "";

            if(log.type === "SCAN") {
                actionName = "📸 QRコード打刻";
                contentVal = log.db ? log.db + " dB" : "打刻完了";
                if (log.lat && log.lng) mapLink = `http://googleusercontent.com/maps.google.com/?q=${log.lat},${log.lng}`;
            } else if(log.type === "CHECK") {
                if(log.field === "r1") { actionName = "📋 点検1 結果入力"; contentVal = log.val; }
                else if(log.field === "r1note") { actionName = "📋 点検1 メモ入力"; noteVal = log.val; }
                else if(log.field === "r2") { actionName = "📋 点検2 結果入力"; contentVal = log.val; }
                else if(log.field === "r2note") { actionName = "📋 点検2 メモ入力"; noteVal = log.val; }
            }

            // 空白の入力イベントなどはスキップして見やすくする
            if(log.type === "CHECK" && !log.val) return;

            excelData.push([
                log.date,
                log.time,
                log.inspector,
                log.area,
                actionName,
                contentVal,
                noteVal,
                mapLink
            ]);
        });

        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(excelData);
        XLSX.utils.book_append_sheet(wb, ws, "タイムライン履歴");
        
        const d = new Date();
        const fileDate = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
        XLSX.writeFile(wb, `巡回タイムライン報告_${fileDate}.xlsx`);
    }

    // メールの本文生成も新しいタイムライン形式に対応
    function sendReport() {
        const timeline = JSON.parse(localStorage.getItem('myPatrolTimeline')) || [];
        if (timeline.length === 0) { alert("報告するデータがありません"); return; }

        const isNormal = confirm("【最終確認】\n全体を通して「異常なし」で報告しますか？");
        const summaryStatus = isNormal ? "【巡回結果：異常なし】" : "【巡回結果：★異常あり★】";
        const mailTo = localStorage.getItem('myPatrolEmail') || "";
        
        let body = `${summaryStatus}\n報告送信日時: ${getTodayDateString()} ${getNowTimeString()}\n\n`;
        body += "＜巡回・点検 時系列全履歴＞\n-----------------------\n";

        timeline.forEach(log => {
            if(log.type === "SCAN") {
                body += `[${log.date} ${log.time}] 📸 ${log.area} 打刻 (担当:${log.inspector}) / 騒音:${log.db||'--'}dB\n`;
            } else if(log.type === "CHECK" && log.val) {
                let fName = log.field.includes("r1") ? "点検1" : "点検2";
                let tName = log.field.includes("note") ? "メモ" : "結果";
                body += `[${log.date} ${log.time}] 📋 ${log.area} ${fName}の${tName}入力 ➡️ 「${log.val}」 (担当:${log.inspector})\n`;
            }
        });
        body += "-----------------------\n";

        const mailSubject = `${summaryStatus} 巡回最終報告 (${getTodayDateString()})`;
        location.href = `mailto:${mailTo}?subject=${encodeURIComponent(mailSubject)}&body=${encodeURIComponent(body)}`;
    }

    function clearData() { if(confirm("全データをリセットしますか？")) { localStorage.removeItem('myPatrolTimeline'); location.reload(); } }
    
    function refreshLogDisplay() {
        const logDiv = document.getElementById('statusLog');
        const timeline = JSON.parse(localStorage.getItem('myPatrolTimeline')) || [];
        let html = "";
        // 直近の打刻を表示
        timeline.filter(l => l.type === "SCAN").reverse().slice(0, 5).forEach(log => {
            html += `<div class="log-entry">✅ ${log.area} (${log.time}) - ${log.inspector}</div>`;
        });
        logDiv.innerHTML = html;
    }

    function setupManualSelect() {
        const sel = document.getElementById('manualAreaSelect');
        const areas = JSON.parse(localStorage.getItem('myPatrolAreas')) || [];
        const targets = areas.filter(a => a.endsWith('#'));
        sel.innerHTML = targets.map(a => `<option value="${a.replace('#','')}">${a.replace('#','')}</option>`).join('');
    }

    function manualLog() {
        const val = document.getElementById('manualAreaSelect').value;
        if(val) doLog(val, true);
    }

    function toggleConfig() {
        const ui = document.getElementById('config-ui');
        if(ui.style.display==='none' || !ui.style.display){
            document.getElementById('cfgAreas').value = localStorage.getItem('myPatrolAreas') ? JSON.parse(localStorage.getItem('myPatrolAreas')).join('\n') : "";
            document.getElementById('cfgEmail').value = localStorage.getItem('myPatrolEmail') || "";
            ui.style.display='block';
        } else { ui.style.display='none'; }
    }

    function saveConfig() {
        localStorage.setItem('myPatrolEmail', document.getElementById('cfgEmail').value);
        localStorage.setItem('myPatrolAreas', JSON.stringify(document.getElementById('cfgAreas').value.split('\n').map(a => a.trim()).filter(a => a)));
        alert("設定を保存しました");
        location.reload();
    }

    window.onload = function() {
        if(localStorage.getItem('myPatrolInspector')) {
            document.getElementById('inspectorName').value = localStorage.getItem('myPatrolInspector');
        }
    }
</script>
</body>
</html>
