<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>17点検パトロールシステム (スマホ版)</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 15px;
            color: #333;
        }
        h1 { font-size: 1.3rem; text-align: center; color: #1a365d; }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #2b6cb0;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }
        button {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .btn-primary { background-color: #3182ce; color: white; }
        .btn-success { background-color: #38a169; color: white; font-size: 1.1rem; }
        .btn-email { background-color: #dd6b20; color: white; font-size: 1.1rem; }
        
        #reader { width: 100%; background: #000; border-radius: 8px; overflow: hidden; }
        .status-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .status-table th, .status-table td { padding: 8px; border: 1px solid #cbd5e0; text-align: left; font-size: 0.9rem; }
        .status-table th { background-color: #ebf8ff; }
        
        /* 点検入力ポップアップ風エリア */
        #inspection-zone {
            display: none;
            background: #fff;
            border: 2px solid #3182ce;
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
        }
        .radio-group { display: flex; gap: 15px; margin-top: 5px; }
        .radio-group label { padding: 6px 12px; border: 1px solid #cbd5e0; border-radius: 6px; background: #f7fafc; }
        .radio-group input:checked + label { background: #3182ce; color: white; border-color: #3182ce; }
        .radio-group input { display: none; }
    </style>
</head>
<body>

    <h1>17ポイント巡回パトロール</h1>

    <div class="card">
        <div class="card-title">① エリアスキャン</div>
        <button class="btn-primary" onclick="startScan()">カメラを起動してQRを読み取る</button>
        <div id="reader" style="display:none;"></div>
    </div>

    <div id="inspection-zone">
        <h3 id="active-area-name" style="margin-top:0; color:#2b6cb0;"></h3>
        <p>状況を選択してください：</p>
        <div class="radio-group">
            <input type="radio" id="status-ok" name="current-status" value="○" checked>
            <label for="status-ok">○ 正常</label>
            <input type="radio" id="status-ng" name="current-status" value="×">
            <label for="status-ng">× 異常</label>
        </div>
        <button class="btn-primary" style="margin-top:15px; background-color:#4a5568;" onclick="saveCurrentPoint()">このポイントを記録</button>
    </div>

    <div class="card">
        <div class="card-title">② 巡回進捗・結果一覧</div>
        <table class="status-table">
            <thead>
                <tr>
                    <th>No</th>
                    <th>点検エリア場所</th>
                    <th>結果</th>
                    <th>点検日時</th>
                </tr>
            </thead>
            <tbody id="progress-list">
                </tbody>
        </table>
    </div>

    <button class="btn-success" onclick="downloadExcel()">点検データをExcel保存</button>
    <button class="btn-email" onclick="sendEmailReport()">総務へメール報告画面を開く</button>

    <script>
        // 17ポイントのエリア定義（現場の実際の名称に合わせて書き換え可能です）
        const totalPoints = 17;
        let patrolData = [];
        
        // データの初期化（17箇所分の空枠を作る）
        for (let i = 1; i <= totalPoints; i++) {
            patrolData.push({
                no: i,
                areaName: `点検エリア第 ${i} ポイント`,
                result: "未巡回",
                timestamp: "-"
            });
        }

        let currentActiveNo = null;
        let html5QrcodeScanner;

        // 進捗一覧表を画面に描画
        function renderTable() {
            const tbody = document.getElementById('progress-list');
            tbody.innerHTML = "";
            patrolData.forEach(item => {
                tbody.innerHTML += `
                    <tr>
                        <td>${item.no}</td>
                        <td>${item.areaName}</td>
                        <td style="font-weight:bold; color:${item.result === '○' ? 'green' : (item.result === '×' ? 'red' : '#718096')}">${item.result}</td>
                        <td>${item.timestamp}</td>
                    </tr>
                `;
            });
        }
        renderTable();

        // 現在の日付＋時間を「2026/06/16 13:45」の形で取得する共通関数
        function getFormattedDateTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            return `${year}/${month}/${date} ${hours}:${minutes}`;
        }

        // カメラ起動
        function startScan() {
            document.getElementById('reader').style.display = 'block';
            html5QrcodeScanner = new Html5Qrcode("reader");
            html5QrcodeScanner.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: 250 },
                (decodedText) => {
                    // QRコードの文字（例: "7" または "点検エリア第 7 ポイント"）から該当Noを判定
                    let matchedNo = parseInt(decodedText.replace(/[^0-9]/g, ''));
                    if (matchedNo >= 1 && matchedNo <= totalPoints) {
                        currentActiveNo = matchedNo;
                        document.getElementById('active-area-name').innerText = `【No.${matchedNo}】 ${patrolData[matchedNo-1].areaName}`;
                        document.getElementById('inspection-zone').style.display = 'block';
                    } else {
                        alert("1〜17の有効な点検QRコードではありません。");
                    }
                    html5QrcodeScanner.stop();
                    document.getElementById('reader').style.display = 'none';
                },
                (err) => {}
            ).catch(err => alert("カメラ起動に失敗しました。"));
        }

        // その場での点検結果の保存
        function saveCurrentPoint() {
            if (currentActiveNo === null) return;
            
            const selectedStatus = document.querySelector('input[name="current-status"]:checked').value;
            
            // 【修正】ここで「日付＋時間」を格納する
            patrolData[currentActiveNo - 1].result = selectedStatus;
            patrolData[currentActiveNo - 1].timestamp = getFormattedDateTime();
            
            document.getElementById('inspection-zone').style.display = 'none';
            currentActiveNo = null;
            renderTable();
            alert("ポイントの記録を保存しました。");
        }

        // --- 【修正】Excel(CSV)保存処理（日付＋時間対応） ---
        function downloadExcel() {
            const currentDateTime = getFormattedDateTime();
            const headers = ["No", "点検エリア場所", "結果", "点検日時"];
            
            let csvRows = ["\uFEFF" + headers.join(",")]; // 文字化け防止BOM付き
            
            patrolData.forEach(item => {
                csvRows.push([
                    item.no,
                    `"${item.areaName}"`,
                    `"${item.result}"`,
                    `"${item.timestamp}"` // ここに「日付＋時間」が入る
                ].join(","));
            });

            const csvContent = csvRows.join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            
            // ファイル名用のスタンプ
            const fileStamp = currentDateTime.replace(/[\/\s:]/g, "");
            link.setAttribute("href", url);
            link.setAttribute("download", `巡回報告_${fileStamp}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // --- 【修正】メール送信処理（本文に日付＋時間を反映） ---
        function sendEmailReport() {
            const currentDateTime = getFormattedDateTime();
            const emailTo = "soumu@example.com"; // 総務（General Affairs）の実際のアドレスに変えてください
            const subject = encodeURIComponent(`【巡回パトロール報告】_${currentDateTime}`);
            
            // メール本文の作成
            let bodyText = `総務担当者様\n\nお疲れ様です。巡回パトロールが完了しました。\n点検日時は ${currentDateTime} です。\n\n【点検結果一覧】\n`;
            
            patrolData.forEach(item => {
                bodyText += `No.${item.no} / ${item.areaName} / 結果: [ ${item.result} ] (確認時間: ${item.timestamp})\n`;
            });
            
            bodyText += `\n以上です。よろしくお願いいたします。`;
            const body = encodeURIComponent(bodyText);
            
            // メールアプリ（またはOutlook、Gmail等）を強制起動
            window.location.href = `mailto:${emailTo}?subject=${subject}&body=${body}`;
        }
    </script>
</body>
</html>
